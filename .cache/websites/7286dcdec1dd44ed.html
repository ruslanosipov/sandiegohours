  body {
      margin: 0;
  }

  #skeleton-loadingCoffeeCup {
      height: 85px;
      width: 73px;
      opacity: 0.7;
      display: block;
      margin-left: auto;
      margin-right: auto;
  }

  #skeleton-loadingCoffeeSteam {
      opacity: 0.4;
      stroke-dasharray: 25;
      animation: dash 2.4s infinite linear;
  }

  #skeleton-logo {
      margin-top: 16px;
      margin-bottom: 16px;
      margin-left: 16px;
      height: 38px;
      width: 38px;

      flex-shrink: 0;
  }

  #skeleton-hamburgerLoader {
      width: 31px;
      height: 31px;
      margin: 16px 0;

      border-radius: 4px;
      background: linear-gradient(to right, #eeeeee 8%, #dddddd 18%, #eeeeee 33%);
      background-size: 900% 100%;

      animation-fill-mode: forwards;
      animation: LoadingGradient 3s linear infinite;
  }

  .skeleton-skeleton-linkContainer {
      display: flex;
      padding: 0;
      margin: 0;
  }

  .skeleton-link {
      display: inline-block;
      width: 75px;
      height: 20px;
      border-radius: 4px;
      margin: 40px 24px 40px 0;
      background: linear-gradient(to right, #eeeeee 8%, #dddddd 18%, #eeeeee 33%);
      background-size: 900% 100%;

      animation-fill-mode: forwards;
      animation: LoadingGradient 3s linear infinite;
  }

  @media screen and (min-width: 768px) {
      .skeleton-hideDesktop {
          display: none;
      }

      #skeleton-logo {
          height: 50px;
          width: 50px;
          margin: auto 24px;
      }

      #skeleton-hamburgerLoader {
          width: 44px;
          height: 44px;
          margin: auto 20px;
      }
  }

  @media screen and (max-width: 767px) {
      .skeleton-hideMobile {
          display: none;
      }
  }

  @media screen and (min-width: 1024px) {
      #skeleton-logo {
          margin: auto 40px;
      }
  }

  @keyframes LoadingGradient {
      0% {
          background-position: 200% 50%
      }

      100% {
          background-position: 0% 50%
      }
  }

  @keyframes dash {
      from {
          stroke-dashoffset: 25;
      }

      to {
          stroke-dashoffset: -25;
      }
  }
</style>

Starbucks Card, in each case, registered to the Linked Account Member's { starbucksRewardsTrademark } account, or (b) by scanning your barcode located in the Starbucks mobile app registered to the Linked Account Member's { starbucksRewardsTrademark } account prior to completing checkout. “Participating Starbucks Stores” are Starbucks locations where a { starbucksRewardsTrademark } member can earn Stars (as defined in the { starbucksRewardsTrademark } Terms of Use) that are located in the United States, including the 50 states, District of Columbia, and United States territories. “Marriott Bonvoy Week” or “Marriott Bonvoy Week | Sip, Dream, Go™” means the weeks designated by Marriott Bonvoy and { starbucksRewardsTrademark } as a Marriott Bonvoy Week and communicated as such in Marriott Bonvoy and { starbucksRewardsTrademark } channels. Linked Account Members may only earn the Points offered under the Marriott Bonvoy Week Offer once during each Marriott Bonvoy Week. Points earned under the Marriott Bonvoy Week Offer will be deposited into Linked Account Members’ Marriott Bonvoy account within 2 business days following the conclusion of the applicable Marriott Bonvoy Week. { arrowLink }","rewards.marriott.footer.body3p1":"Linked Account Members will earn double { starbucksRewardsTrademark } Stars (“Stars”) on all Qualifying Starbucks Transactions (as defined below) during Eligible Stays at Participating Marriott Bonvoy Hotels (the “Double Stars Offer”), in accordance with the earning methodology for their Starbucks Rewards status level on Double Star Days. Your Starbucks Rewards and Marriott Bonvoy accounts must be linked at least 48 hours before the start of your Eligible Stay (defined below) to earn double Stars under the Double Stars Offer. Under the Double Stars Offer, Linked Account members will earn Double Stars on all Eligible Stays (as defined below). More information on Starbucks Rewards status levels and Double Star Days can be found at <upcomingTermsExternalLink>https://www.starbucks.com/rewards/upcomingterms/</upcomingTermsExternalLink>. “Qualifying Starbucks Transactions” means any purchase at a Participating Starbucks Store by a Linked Account Member of food, beverage(s), and/or merchandise, excluding purchases of alcoholic beverages, Starbucks Card eGifts and physical Starbucks gift cards (“Starbucks Cards”). “Eligible Stay” means a stay of one or more consecutive nights at a Participating Marriott Bonvoy Hotel by a Linked Account Member who: (a) provides the Linked Account Member’s name and Marriott Bonvoy account number at the time the reservation is made or at least 48 hours prior to check-in (whichever comes earlier); (b) pays a Qualifying Rate or applies an Award Redemption (as each such term is defined in the Marriott Bonvoy Program Rules (as defined below)) for the stay; and (c) stays in one of the reserved guest rooms under the reservation. For purposes of the Double Star Offer, an Eligible Stay begins at 12:00AM local time on the check-in date of the Eligible Stays and ends at 11:59pm local time on the check-out date of an Eligible Stay. For the avoidance of doubt, Linked Account Members who make reservations less than 48 hours prior to check-in will not earn double Stars under the Double Stars Offer. Stays booked at a Non-Qualifying Rate (as such term is defined in the Marriott Bonvoy Program Rules) will not earn double Stars under the Double Stars Offer. “Participating Marriott Bonvoy Hotels” means properties that participate in Marriott Bonvoy as set forth in the Marriott Bonvoy Program Rules, excluding Homes and Villas by Marriott Bonvoy and The Ritz-Carlton Yacht Collection. Stars awarded under the Double Stars Offer will be deposited into Linked Account Members’ { starbucksRewardsTrademark } account within 2 business days following the applicable Qualifying Starbucks Transaction. A Linked Account Member may earn a maximum of 1000 Stars under the Double Stars Offer per Program Year. “Program Year” means each consecutive 12-month period commencing on June 18, 2024. { arrowLink }","rewards.marriott.footer.body4p1":"Members of Marriott Bonvoy and Starbucks Rewards who have linked accounts may transfer a minimum of 1000 points and up to 50,000 Marriott Bonvoy points per day in 10-point increments to their Starbucks Rewards account. Once points have been converted to Stars, Stars will automatically be deposited into the Linked Account Member’s Starbucks Rewards account. In most cases, Stars will be posted to the Linked Account Member’s Starbucks Rewards account within approximately 2 business days. Once a request to transfer points to Stars has been submitted by a Linked Account Member it cannot be cancelled, changed or refunded and the <cta>Starbucks Rewards Terms of Use</cta> apply, including Star Expiration. Stars cannot be transferred back to Marriott Bonvoy Points. { arrowLink }","rewards.marriott.footer.bodyAddTermsP1":"By linking your Marriott Bonvoy and { starbucksRewardsTrademark } accounts, you agree that Starbucks and Marriott Bonvoy (and their affiliates) may share your information (including, for the avoidance of doubt, Eligible Stay information) for the purpose of facilitating the award of Points into your Marriott Bonvoy account and Stars into your { starbucksRewardsTrademark } account under these Terms and Conditions.","rewards.marriott.footer.bodyAddTermsP2":"The { starbucksRewardsTrademark } program is governed by the { starbucksRewardsTrademark } <cta1>Terms of Use</cta1> and Starbucks Privacy Policy, which are incorporated by reference. For more information visit <cta2>www.starbucks.com/rewards</cta2>.","rewards.marriott.footer.bodyAddTermsP3":"The Marriott Bonvoy Loyalty program, including without limitation participation in loyalty program and the redemption of Points, is governed by the <cta1>Marriott Bonvoy Program Rules</cta1> and <cta2>Marriott Group Global Privacy Statement</cta2>.","rewards.marriott.footer.bodyAddTermsP4":"You may de-link your Marriott Bonvoy and { starbucksRewardsTrademark } accounts at any time. Marriott Bonvoy and { starbucksRewardsTrademark } reserve the right to change, modify, suspend, and/or terminate the offers and benefits provided by the Program at any time without notice. Offers void where prohibited by law. Other restrictions may apply. Determinations of eligibility are made in { starbucksRewardsTrademark } and Marriott Bonvoy’s sole discretion. { starbucksRewardsTrademark } and Marriott Bonvoy reserve the right to review and investigate all Program activities. { starbucksRewardsTrademark } and Marriott Bonvoy further reserve the right to unlink accounts as a result of suspected fraud, a change in eligibility, or termination or suspension of the Program. { starbucksRewardsTrademark } and Marriott Bonvoy reserve the right to cancel, revoke, and/or adjust Points and Stars earned where (i) { starbucksRewardsTrademark } and Marriott Bonvoy suspect there has been fraudulent activity, suspected abuse, and/or violation of the Terms and Conditions connected with a Qualifying Starbucks Transaction, or (ii) a refund has been provided in connection with a Qualifying Starbucks Transaction.","rewards.marriott.footer.bodyAddTermsP5":"Marriott Bonvoy and { starbucksRewardsTrademark } reserve the right to terminate the Program or to change, limit, modify or cancel the Terms and Conditions, benefits, awards, and special offers, in whole or in part, at any time, with or without notice. Continuing to be enrolled in the Program and participating in any of the offers provided the Terms and Conditions after any such changes or modifications are made to these the Terms and Conditions will indicate agreement to the changes and modifications.","rewards.marriott.footer.bodyAddTermsP6":"Marriott Bonvoy® and its affiliated brands and hotels are the registered trademarks and/or service marks of Marriott International, Inc. and its affiliates. Marriott Bonvoy Week | Sip, Dream, Go is the registered trademark and/or service mark of Marriott International, Inc. Used under license from Marriott International, Inc. Marriott International, Inc. and its affiliates are not responsible for goods or services offered by Starbucks Corporation or its affiliates.","rewards.marriott.footer.bodyAddTermsP7":"Starbucks and the Starbucks logos are registered trademarks of Starbucks Corporation.","rewards.marriott.footer.bottomBody":"{ unlinkAccounts } from the Marriott Bonvoy and { starbucksRewardsTrademark } partnership. After unlinking, you won’t earn more points and Stars.","rewards.marriott.footer.bottomHeader":"Unlink Accounts","rewards.marriott.footer.header2":"{termsFooterReference2}Marriott Bonvoy Points on Qualifying Starbucks Transactions during Marriott Bonvoy Week","rewards.marriott.footer.header3":"{termsFooterReference3}Double Stars During Your Stay at a Participating Marriott Bonvoy Hotel","rewards.marriott.footer.header4":"{termsFooterReference4}Transfer Marriott Bonvoy® Points to Starbucks Rewards Stars","rewards.marriott.footer.headerAddTerms":"Additional Terms","rewards.marriott.footer.marriottUnlinkDialogBody":"When you unlink, you'll miss out on exclusive partnership perks.","rewards.marriott.footer.marriottUnlinkDialogConfirmButton":"Yes, unlink accounts","rewards.marriott.footer.marriottUnlinkDialogHeader":"Unlink accounts?","rewards.marriott.footer.partnershipFAQs":"Partnership FAQs","rewards.marriott.footer.topContent":"To learn more, visit the <cta>Partnership FAQs</cta>.","rewards.marriott.footer.unlinkAccounts":"Unlink your accounts","rewards.marriott.marriottGettingStartedBlock1Body":"<cta>Join now</cta> then come back here to continue. Already a member? Skip to step 2.","rewards.marriott.marriottGettingStartedBlock1Header":"Join Marriott Bonvoy®","rewards.marriott.marriottGettingStartedBlock2Body":"<ctaJoin>Join now</ctaJoin> or <ctaSignIn>Sign in</ctaSignIn> to begin the account linking process.","rewards.marriott.marriottGettingStartedBlock3Body":"
