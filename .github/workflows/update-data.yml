name: Update Data & Deploy Site

on:
  workflow_dispatch:      # Manual trigger button only

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "update-data"
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python dependencies
        run: pip install requests httpx

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch restaurants by neighborhood
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          cd scripts
          for area in north_park south_park normal_heights hillcrest little_italy gaslamp ocean_beach mission_valley; do
            echo "Fetching $area..."
            python orchestrator.py --area "$area" --fetch-only
          done

      - name: Parse happy hours from websites
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd scripts
          python orchestrator.py --step=parse_happy_hours

      - name: Apply manual overrides
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          cd scripts
          python orchestrator.py --step=overrides

      - name: Parse menus from websites
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd scripts
          python orchestrator.py --step=parse_menus

      - name: Check for CSV changes
        id: check_changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          if [[ -n $(git status --porcelain public/) ]]; then
            git add public/*.csv
            git commit -m "chore: refresh happy hour data [$(date +%Y-%m-%d)]"
            git push
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Next.js site
        run: npm run build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
